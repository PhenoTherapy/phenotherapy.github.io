<!-- ===== swup: 페이지 전환 시 음악이 끊기지 않도록 #main 내부만 교체 ===== -->
<script src="https://cdn.jsdelivr.net/npm/swup@4/dist/Swup.umd.js"></script>
<script>
(function(){
  function startSwup(){
    if (typeof Swup === 'undefined') return;
    new Swup({ containers: ['#main'], animationSelector: false });
  }
  if (document.readyState !== 'loading') { startSwup(); }
  else { window.addEventListener('DOMContentLoaded', startSwup); }
})();
</script>

<!-- ===== 배경음악: 플레이어를 body 끝에 단 한 번만 생성하여 페이지 전환에도 유지 ===== -->
<script>
(function(){
  // 이미 만들어진 플레이어가 있으면 다시 만들지 않음 (페이지 전환 시 중복 방지)
  if (window.__bgmReady) return;
  window.__bgmReady = true;

  var audioUrl = "{{ '/assets/audio/phenotherapy-lab-theme.mp3' | relative_url }}";

  // 오디오 요소 생성
  var a = document.createElement('audio');
  a.id = 'bgm';
  a.loop = true;
  a.preload = 'auto';
  a.volume = 0.5;
  var src = document.createElement('source');
  src.src = audioUrl;
  src.type = 'audio/mpeg';
  a.appendChild(src);

  // 버튼 생성
  var b = document.createElement('button');
  b.id = 'bgm-toggle';
  b.setAttribute('aria-label', '배경음악 켜기/끄기');
  b.style.cssText = 'position:fixed; right:16px; bottom:16px; z-index:9999;' +
    'width:48px; height:48px; border-radius:50%; border:none; cursor:pointer;' +
    'background:#2b6cb0; color:#fff; font-size:20px; box-shadow:0 2px 8px rgba(0,0,0,0.25);';

  function update(){ b.textContent = a.paused ? '🔈' : '🔊'; }
  b.addEventListener('click', function(){
    if (a.paused) { a.play(); } else { a.pause(); }
    update();
  });

  // body 맨 끝에 한 번만 붙이기 (swup이 교체하는 #main 바깥이므로 페이지 전환에도 유지됨)
  document.body.appendChild(a);
  document.body.appendChild(b);
  update();
})();
</script>
